version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: ai_code_review_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    restart: always

volumes:
  mongo_data:
